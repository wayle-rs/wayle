name: Check PR title

on:
    pull_request_target:
        types:
            - opened
            - reopened
            - edited
            - synchronize

permissions: {}

jobs:
    check:
        name: Conventional commit
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v6
              with:
                  requireScope: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
